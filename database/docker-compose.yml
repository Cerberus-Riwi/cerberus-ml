services:

  postgres:

    image: postgres:17

    container_name: cerberus-db

    restart: unless-stopped

    environment:

      POSTGRES_USER: cerberus

      POSTGRES_PASSWORD: cerberus123

      POSTGRES_DB: cerberus

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

      - ./init:/docker-entrypoint-initdb.d

volumes:

  postgres_data: